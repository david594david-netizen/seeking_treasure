<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>記憶老街道 - 懷舊尋寶</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        
        body {
            /* 復古懷舊背景色 */
            background-color: #f3e8d6;
            font-family: 'Noto Serif TC', serif;
            touch-action: manipulation; /* 優化觸控體驗 */
            overflow: hidden;
        }

        /* 復古濾鏡與木紋質感 */
        .retro-vibe {
            filter: sepia(0.3) contrast(1.1);
        }

        .wooden-shelf {
            background-color: #d4b58b;
            box-shadow: inset 0 -10px 15px rgba(0,0,0,0.1), 0 5px 5px rgba(0,0,0,0.2);
            border-bottom: 8px solid #a67c52;
            border-radius: 8px;
        }

        /* 動畫效果 */
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px) rotate(-5deg); }
            75% { transform: translateX(5px) rotate(5deg); }
        }

        @keyframes successPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3) rotate(10deg); filter: brightness(1.2); }
            100% { transform: scale(1); }
        }

        .animate-pop {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .animate-shake {
            animation: shake 0.3s ease-in-out;
        }

        .animate-success {
            animation: successPop 0.6s ease-in-out;
            z-index: 50;
        }

        .animate-pop {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }
        
        .item-card {
            transition: transform 0.1s ease;
        }
        .item-card:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body class="h-[100dvh] w-screen flex flex-col items-center justify-between retro-vibe">

    <!-- 頂部任務區 -->
    <header class="w-full py-4 md:py-6 text-center shadow-md bg-[#c29c6d] text-white z-10 relative">
        <h1 class="text-2xl md:text-3xl font-bold tracking-widest drop-shadow-md">記憶柑仔店</h1>
        
        <!-- 分數與時間顯示 (新增) -->
        <div class="flex justify-between px-6 mt-2 text-lg md:text-xl font-bold text-[#fef5e7] drop-shadow">
            <div>⭐ 找對了: <span id="score-display" class="text-yellow-200 text-2xl md:text-3xl">0</span></div>
            <div>⏱️ 剩餘: <span id="time-display" class="text-white text-2xl md:text-3xl">30</span> 秒</div>
        </div>

        <div class="mt-3 bg-white/20 mx-4 py-3 rounded-2xl border border-white/30 backdrop-blur-sm">
            <p class="text-lg md:text-xl text-[#fef5e7] font-medium mb-1">請幫忙找出：</p>
            <div class="flex items-center justify-center gap-3">
                <span id="target-icon" class="text-5xl md:text-6xl drop-shadow-lg">📺</span>
                <span id="target-name" class="text-3xl md:text-4xl font-bold text-white drop-shadow-md">老電視</span>
            </div>
        </div>
        <!-- 過關提示 -->
        <div id="success-overlay" class="absolute inset-0 bg-green-500/90 hidden flex-col items-center justify-center z-20 transition-opacity duration-300">
            <div class="text-6xl mb-2">🎉</div>
            <h2 class="text-4xl font-bold text-white drop-shadow-lg">好眼力！</h2>
        </div>

        <!-- 遊戲結束提示 (新增) -->
        <div id="game-over-overlay" class="fixed inset-0 bg-black/80 hidden flex-col items-center justify-center z-50 backdrop-blur-sm">
            <h2 class="text-5xl md:text-6xl font-bold text-[#fef5e7] drop-shadow-lg mb-4">時間到！</h2>
            <div class="bg-[#d4b58b] p-8 rounded-3xl border-4 border-[#a67c52] text-center shadow-2xl min-w-[300px]">
                <p class="text-2xl text-[#5a3d22] font-bold mb-2">你的成績</p>
                <p class="text-7xl font-bold text-[#c84343] mb-8 drop-shadow-md"><span id="final-score">0</span> <span class="text-3xl text-[#5a3d22]">個</span></p>
                <button id="btn-play-again" class="w-full bg-[#8b6b4a] text-white active:bg-[#6e543a] border-2 border-[#6e543a] text-2xl font-bold py-4 px-6 rounded-xl shadow-md transition-transform transform active:scale-95">
                    再來一局
                </button>
            </div>
        </div>
    </header>

    <!-- 核心尋寶層架區 -->
    <main class="flex-grow w-full max-w-2xl p-4 md:p-6 flex flex-col justify-center gap-4 md:gap-8 overflow-y-auto">
        
        <!-- 上層架 -->
        <div class="wooden-shelf relative w-full h-32 md:h-40 flex items-end justify-around pb-2 px-2" id="shelf-1">
            <!-- 物品將由 JS 動態產生 -->
        </div>

        <!-- 中層架 -->
        <div class="wooden-shelf relative w-full h-32 md:h-40 flex items-end justify-around pb-2 px-2" id="shelf-2">
            <!-- 物品將由 JS 動態產生 -->
        </div>

        <!-- 下層架 -->
        <div class="wooden-shelf relative w-full h-32 md:h-40 flex items-end justify-around pb-2 px-2" id="shelf-3">
            <!-- 物品將由 JS 動態產生 -->
        </div>

    </main>

    <!-- 底部控制按鈕區與機構署名 -->
    <footer class="w-full pt-4 pb-6 px-4 flex flex-col items-center bg-[#eae0cd] shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] rounded-t-3xl max-w-2xl mx-auto z-10">
        <div class="w-full flex justify-center gap-4 mb-3">
            <button id="btn-restart" class="flex-1 max-w-[200px] bg-[#c84343] text-white active:bg-[#a03333] border-2 border-[#a03333] text-xl md:text-2xl font-bold py-4 px-4 rounded-2xl shadow-md transition-transform transform active:scale-95 flex items-center justify-center gap-2">
                <span>🔄</span> 重新開始
            </button>
        </div>
        <p class="text-xs md:text-sm text-[#8b6b4a] font-medium tracking-widest mt-2">尚讚居家長照機構 開發</p>
    </footer>

    <script>
        // --- 音效引擎 (Web Audio API) ---
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // 答對音效：清脆的叮咚聲
        function playSuccessSound() {
            if (!audioCtx) return;
            const osc1 = audioCtx.createOscillator();
            const osc2 = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc1.type = 'sine';
            osc2.type = 'sine';
            
            osc1.frequency.setValueAtTime(659.25, audioCtx.currentTime); // E5
            osc2.frequency.setValueAtTime(880.00, audioCtx.currentTime + 0.15); // A5
            
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.05);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            
            osc1.connect(gainNode);
            osc2.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc1.start(audioCtx.currentTime);
            osc1.stop(audioCtx.currentTime + 0.15);
            osc2.start(audioCtx.currentTime + 0.15);
            osc2.stop(audioCtx.currentTime + 0.5);
        }

        // 答錯音效：溫和的低音剝聲
        function playErrorSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
            
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.05);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        // 遊戲結束音效 (新增)
        function playGameOverSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 1);
            
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.1);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 1);
        }

        // --- 遊戲邏輯 ---
        const items = [
            { icon: '📻', name: '收音機' },
            { icon: '📺', name: '老電視' },
            { icon: '☎️', name: '撥盤電話' },
            { icon: '🚲', name: '腳踏車' },
            { icon: '🍬', name: '古早味糖果' },
            { icon: '🪀', name: '溜溜球' },
            { icon: '🪁', name: '風箏' },
            { icon: '🧮', name: '算盤' },
            { icon: '🕰️', name: '老時鐘' },
            { icon: '🍵', name: '奉茶杯' },
            { icon: '🏮', name: '紅燈籠' },
            { icon: '🧵', name: '針線盒' }
        ];

        let currentTarget = null;
        let isLevelActive = false;

        // 新增計時與分數變數
        let score = 0;
        let timeLeft = 30;
        let timer = null;
        let isPlaying = false;

        const targetIconEl = document.getElementById('target-icon');
        const targetNameEl = document.getElementById('target-name');
        const successOverlay = document.getElementById('success-overlay');
        const gameOverOverlay = document.getElementById('game-over-overlay');
        const scoreDisplayEl = document.getElementById('score-display');
        const timeDisplayEl = document.getElementById('time-display');
        const finalScoreEl = document.getElementById('final-score');
        
        const btnRestart = document.getElementById('btn-restart');
        const btnPlayAgain = document.getElementById('btn-play-again');
        
        // 初始化解鎖音效
        document.body.addEventListener('touchstart', initAudio, { once: true });
        document.body.addEventListener('mousedown', initAudio, { once: true });

        // 打亂陣列
        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // 建立物品元素
        function createItemElement(item, delayIndex) {
            const div = document.createElement('div');
            // 加入延遲動畫，讓物品有「依序擺上架」的感覺
            div.className = `item-card text-5xl sm:text-6xl md:text-7xl cursor-pointer select-none drop-shadow-xl animate-pop hover:scale-110 active:scale-90 relative`;
            div.style.animationDelay = `${delayIndex * 0.05}s`;
            
            // 加入一個微微的隨機旋轉角度，看起來更自然
            const randomRotate = Math.floor(Math.random() * 20) - 10;
            const innerDiv = document.createElement('div');
            innerDiv.textContent = item.icon;
            innerDiv.style.transform = `rotate(${randomRotate}deg)`;
            
            div.appendChild(innerDiv);

            // 點擊事件
            div.addEventListener('click', function() {
                if (!isLevelActive || !isPlaying) return;
                initAudio();
                
                if (item.name === currentTarget.name) {
                    // 答對了！
                    isLevelActive = false;
                    score++;
                    scoreDisplayEl.textContent = score; // 更新分數顯示
                    playSuccessSound();
                    
                    // 物品變大發光動畫
                    this.classList.add('animate-success');
                    
                    // 顯示大大的過關提示 (時間大幅縮短，讓節奏變快)
                    setTimeout(() => {
                        successOverlay.classList.remove('hidden');
                        successOverlay.classList.add('flex');
                    }, 300);

                    // 0.6秒後自動進入下一關
                    setTimeout(() => {
                        successOverlay.classList.add('hidden');
                        successOverlay.classList.remove('flex');
                        if (isPlaying) startNewLevel(); // 確保還在遊戲中才換關
                    }, 600);

                } else {
                    // 答錯了
                    playErrorSound();
                    // 移除舊動畫並重新加入搖晃動畫
                    this.classList.remove('animate-shake');
                    void this.offsetWidth; // 觸發重繪
                    this.classList.add('animate-shake');
                }
            });

            return div;
        }

        // 開始新回合
        function startNewLevel() {
            isLevelActive = true;
            
            // 清空層架
            const shelves = [
                document.getElementById('shelf-1'),
                document.getElementById('shelf-2'),
                document.getElementById('shelf-3')
            ];
            shelves.forEach(shelf => shelf.innerHTML = '');

            // 隨機挑選 1 個目標物品與數個干擾物品 (共 10-12 個)
            const shuffledItems = shuffleArray(items);
            currentTarget = shuffledItems[0];
            
            // 更新頂部提示
            targetIconEl.textContent = currentTarget.icon;
            targetNameEl.textContent = currentTarget.name;

            // 準備要放置到層架上的物品陣列
            // 確保目標物品一定在裡面，再隨機抓幾個放入
            let levelItems = shuffledItems.slice(0, 11); 
            // 再次打亂，避免目標永遠在第一個
            levelItems = shuffleArray(levelItems);

            // 分配物品到層架
            let delayCounter = 0;
            levelItems.forEach((item, index) => {
                const shelfIndex = index % 3; // 均勻分配到 3 個層架
                const itemEl = createItemElement(item, delayCounter++);
                shelves[shelfIndex].appendChild(itemEl);
            });
        }

        // 開始整場 30 秒遊戲 (新增)
        function startGame() {
            initAudio();
            score = 0;
            timeLeft = 30;
            scoreDisplayEl.textContent = score;
            timeDisplayEl.textContent = timeLeft;
            isPlaying = true;
            
            gameOverOverlay.classList.add('hidden');
            gameOverOverlay.classList.remove('flex');
            
            // 清除之前的計時器並重新啟動
            if (timer) clearInterval(timer);
            
            timer = setInterval(() => {
                timeLeft--;
                timeDisplayEl.textContent = timeLeft;
                
                // 倒數結束
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
            
            startNewLevel();
        }

        // 遊戲結束處理 (新增)
        function endGame() {
            isPlaying = false;
            isLevelActive = false;
            clearInterval(timer);
            playGameOverSound();
            
            finalScoreEl.textContent = score;
            gameOverOverlay.classList.remove('hidden');
            gameOverOverlay.classList.add('flex');
        }

        // 按鈕：重新開始 (底部按鈕)
        btnRestart.addEventListener('click', () => {
            const icon = btnRestart.querySelector('span');
            icon.style.transform = 'rotate(180deg)';
            icon.style.transition = 'transform 0.3s';
            setTimeout(() => { icon.style.transform = 'rotate(0deg)'; }, 300);
            
            startGame();
        });

        // 按鈕：遊戲結束畫面的「再來一局」
        btnPlayAgain.addEventListener('click', () => {
            startGame();
        });

        // 啟動遊戲 (直接開始計時)
        startGame();

    </script>
</body>
</html>
